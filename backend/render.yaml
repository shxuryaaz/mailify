# Render blueprint for the Mailify backend + daily watch-renewal cron.
# Fill secrets in the Render dashboard (marked sync:false) — never commit them.

services:
  - type: web
    name: mailify-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && prisma generate && prisma db push --skip-generate"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DRAFT_MODE
        value: reply_worthy
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GMAIL_PUBSUB_TOPIC
        sync: false
      - key: PUBSUB_VERIFICATION_TOKEN
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Daily: re-arm every Gmail watch (they expire ~7 days, silently). Logs loudly
  # on failure. Uses curl against the protected cron endpoint.
  - type: cron
    name: mailify-watch-renewal
    runtime: python
    plan: starter
    schedule: "0 9 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: >
      curl -fsS -X POST "$PUBLIC_BASE_URL/cron/renew-watches"
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
